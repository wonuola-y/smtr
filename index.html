async function hashUserPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function findUserByEmail(email) {
  const key = email.trim().toLowerCase();
  if (window.db) {
    try {
      const snap = await window.db.collection(FS_USERS).where('email','==',key).limit(1).get();
      if (!snap.empty) return snap.docs[0].data();
    } catch {}
  }
  return getUsers().find(u=>u.email.toLowerCase()===key) || null;
}

async function saveUserToDB(user) {
  if (window.db) { try { await window.db.collection(FS_USERS).doc(user.id).set(user); } catch {} }
  saveUsers([...getUsers().filter(u=>u.id!==user.id), user]);
}

function cartKey(uid)     { return uid ? `smtr_cart_u${uid}` : 'smtr_cart'; }

/* Merge guest cart into user cart on login */
function mergeGuestCart(uid) {
  try {
    const guest = JSON.parse(localStorage.getItem('smtr_cart')||'[]');
    if (!guest.length) return;
    const userCart = JSON.parse(localStorage.getItem(cartKey(uid))||'[]');
    const merged = [...userCart];
    guest.forEach(g => {
      const ex = merged.find(i=>i.id===g.id&&i.variant===g.variant);
      if (ex) ex.qty += g.qty; else merged.push(g);
    });
    localStorage.setItem(cartKey(uid), JSON.stringify(merged));
    localStorage.removeItem('smtr_cart');
  } catch {}
}

/* ── Wishlist hook ── */
function useWishlist(userId) {
  const key = wishlistKey(userId);
  const [items, setItems] = useState(()=>{ try { return JSON.parse(localStorage.getItem(key))||[]; } catch { return []; } });
  useEffect(()=>{ try { setItems(JSON.parse(localStorage.getItem(key))||[]); } catch { setItems([]); } }, [key]);
  const persist = it => { setItems(it); try { localStorage.setItem(key,JSON.stringify(it)); } catch {} };
  const toggle = product => {
    const exists = items.find(i=>i.id===product.id);
    if (exists) persist(items.filter(i=>i.id!==product.id));
    else persist([...items, product]);
  };
  const has = id => items.some(i=>i.id===id);
  return { items, toggle, has, count:items.length };
}

/* ── Cart hook ── */
function useCart(userId) {
  const key = cartKey(userId);
  const [items, setItems] = useState(()=>{ try { return JSON.parse(localStorage.getItem(key))||[]; } catch { return []; } });
  useEffect(()=>{ try { setItems(JSON.parse(localStorage.getItem(key))||[]); } catch { setItems([]); } }, [key]);
  const persist = it => { setItems(it); try { localStorage.setItem(key,JSON.stringify(it)); } catch {} };
  const add = (product, variant) => {
    const ex = items.find(i=>i.id===product.id&&i.variant===variant);
    if (ex) persist(items.map(i=>i.id===product.id&&i.variant===variant?{...i,qty:i.qty+1}:i));
    else persist([...items, {...product, variant, qty:1}]);
  };
  const remove  = (id,variant) => persist(items.filter(i=>!(i.id===id&&i.variant===variant)));
  const updateQty = (id,variant,qty) => { if(qty<1) remove(id,variant); else persist(items.map(i=>i.id===id&&i.variant===variant?{...i,qty}:i)); };
  const clear = () => persist([]);
  const total = items.reduce((s,i)=>s+i.price*i.qty,0);
  const count = items.reduce((s,i)=>s+i.qty,0);
  return { items, add, remove, updateQty, clear, total, count };
}

  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  if (!open) return null;

  const inp = { width:'100%', padding:'11px 14px', border:`1px solid ${C.rule}`, background:C.bg, fontFamily:C.sans, fontSize:13, color:C.ink, outline:'none', transition:'border-color 0.15s' };
  const lbl = { fontFamily:C.sans, fontSize:9, letterSpacing:'0.16em', textTransform:'uppercase', color:C.mid, display:'block', marginBottom:6 };

  const handleLogin = async e => {
    e.preventDefault(); setError(''); setLoading(true);
    try {
      const user = await findUserByEmail(form.email);
      if (!user) { setError('No account found with that email.'); setLoading(false); return; }
      const hash = await hashUserPw(form.password);
      if (hash !== user.passwordHash) { setError('Incorrect password.'); setLoading(false); return; }
      const sess = { id:user.id, email:user.email, name:user.name };
      mergeGuestCart(sess.id);
      saveUserSession(sess);
      onLogin(sess);
      onClose();
    } catch { setError('Something went wrong. Please try again.'); }
    setLoading(false);
  };

  const handleRegister = async e => {
    e.preventDefault(); setError(''); setLoading(true);
    try {
      if (!form.name.trim())          { setError('Please enter your name.'); setLoading(false); return; }
      if (!form.email.includes('@'))  { setError('Please enter a valid email.'); setLoading(false); return; }
      if (form.password.length < 6)  { setError('Password must be at least 6 characters.'); setLoading(false); return; }
      if (form.password !== form.confirm) { setError('Passwords do not match.'); setLoading(false); return; }
      const existing = await findUserByEmail(form.email);
      if (existing) { setError('An account with that email already exists.'); setLoading(false); return; }
      const hash = await hashUserPw(form.password);
      const newUser = { id:Date.now().toString(), email:form.email.trim().toLowerCase(), name:form.name.trim(), passwordHash:hash, createdAt:new Date().toISOString().slice(0,10) };
      await saveUserToDB(newUser);
      const sess = { id:newUser.id, email:newUser.email, name:newUser.name };
      mergeGuestCart(sess.id);
      saveUserSession(sess);
      onLogin(sess);
      onClose();
    } catch { setError('Something went wrong. Please try again.'); }
    setLoading(false);
  };

  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{ position:'fixed',inset:0,background:'rgba(61,0,16,0.5)',zIndex:1100,display:'flex',alignItems:'center',justifyContent:'center',padding:20,animation:'fadeIn 0.2s ease' }}>
      <div style={{ background:C.white,width:'100%',maxWidth:420,padding:'44px 40px 36px',position:'relative',boxShadow:'0 24px 60px rgba(61,0,16,0.18)' }}>
        <button onClick={onClose} style={{ position:'absolute',top:16,right:20,background:'none',border:'none',fontSize:24,color:C.mid,cursor:'pointer',lineHeight:1 }}>×</button>

        <div style={{ textAlign:'center',marginBottom:28 }}>
          <p style={{ fontFamily:C.serif,fontSize:28,color:C.ink,fontStyle:'italic',lineHeight:1.1 }}>
            {tab==='login' ? 'Welcome back' : 'Join us'}
          </p>
          <p style={{ fontFamily:C.sans,fontSize:10,color:C.mid,letterSpacing:'0.14em',marginTop:6 }}>
            {tab==='login' ? 'Sign in to see your saved items' : 'Create an account to save your cart & wishlist'}
          </p>
        </div>

        {/* Tabs */}
        <div style={{ display:'flex',borderBottom:`1px solid ${C.rule}`,marginBottom:28 }}>
          {[['login','Sign In'],['register','Create Account']].map(([t,l])=>(
            <button key={t} onClick={()=>{ setTab(t); setError(''); setForm({name:'',email:'',password:'',confirm:''}); }}
              style={{ flex:1,padding:'10px 0',background:'none',border:'none',borderBottom:`2px solid ${tab===t?C.crimson:'transparent'}`,fontFamily:C.sans,fontSize:10,letterSpacing:'0.14em',textTransform:'uppercase',color:tab===t?C.crimson:C.mid,cursor:'pointer',transition:'all 0.15s',marginBottom:-1 }}>{l}</button>
          ))}
        </div>

        <form onSubmit={tab==='login'?handleLogin:handleRegister} style={{ display:'flex',flexDirection:'column',gap:16 }}>
          {tab==='register'&&(
            <div><label style={lbl}>Full Name</label>
              <input style={inp} value={form.name} onChange={e=>set('name',e.target.value)} placeholder="Ada Okafor"
                onFocus={e=>e.target.style.borderColor=C.crimson} onBlur={e=>e.target.style.borderColor=C.rule} />
            </div>
          )}
          <div><label style={lbl}>Email</label>
            <input style={inp} type="email" value={form.email} onChange={e=>set('email',e.target.value)} placeholder="ada@email.com"
              onFocus={e=>e.target.style.borderColor=C.crimson} onBlur={e=>e.target.style.borderColor=C.rule} />
          </div>
          <div><label style={lbl}>Password</label>
            <input style={inp} type="password" value={form.password} onChange={e=>set('password',e.target.value)} placeholder="••••••••"
              onFocus={e=>e.target.style.borderColor=C.crimson} onBlur={e=>e.target.style.borderColor=C.rule} />
          </div>
          {tab==='register'&&(
            <div><label style={lbl}>Confirm Password</label>
              <input style={inp} type="password" value={form.confirm} onChange={e=>set('confirm',e.target.value)} placeholder="••••••••"
                onFocus={e=>e.target.style.borderColor=C.crimson} onBlur={e=>e.target.style.borderColor=C.rule} />
            </div>
          )}
          {error&&<p style={{ fontFamily:C.sans,fontSize:12,color:C.red,marginTop:-4 }}>{error}</p>}
          <button type="submit" disabled={loading}
            style={{ padding:'14px',background:loading?C.mid:C.crimson,color:C.white,border:'none',fontFamily:C.sans,fontSize:10,letterSpacing:'0.22em',textTransform:'uppercase',cursor:loading?'default':'pointer',transition:'background 0.15s',marginTop:4 }}
            onMouseEnter={e=>{ if(!loading) e.currentTarget.style.background=C.red; }}
            onMouseLeave={e=>{ if(!loading) e.currentTarget.style.background=C.crimson; }}>
            {loading ? 'Please wait…' : tab==='login' ? 'Sign In →' : 'Create Account →'}
          </button>
          <p style={{ fontFamily:C.sans,fontSize:11,color:C.mid,textAlign:'center',marginTop:4 }}>
            {tab==='login' ? <>New here? <button type="button" onClick={()=>setTab('register')} style={{ background:'none',border:'none',color:C.crimson,fontFamily:C.sans,fontSize:11,cursor:'pointer',textDecoration:'underline',padding:0 }}>Create an account</button></> : <>Already have an account? <button type="button" onClick={()=>setTab('login')} style={{ background:'none',border:'none',color:C.crimson,fontFamily:C.sans,fontSize:11,cursor:'pointer',textDecoration:'underline',padding:0 }}>Sign in</button></>}
          </p>
        </form>
      </div>
    </div>
  );
}

/* ── Shop Page ── */
function Shop({ setPage, setSelectedProduct, cart, wishlist, products }) {
  const [filter, setFilter] = useState('All');
  const [addedId, setAddedId] = useState(null);
  const available = products.filter(p => !p.soldOut);
  const filtered = filter==='All' ? available : available.filter(p=>p.cat===filter);

  const handleQuickAdd = (e, product) => {
    e.stopPropagation();
    cart.add(product, product.variants[0]);
    setAddedId(product.id);
    setTimeout(()=>setAddedId(null), 1400);
  };

  const handleWishlistToggle = (e, product) => {
    e.stopPropagation();
    wishlist.toggle(product);
  };

  return (
    <div style={{ paddingTop:64 }}>
      <div style={{ padding:'48px clamp(20px,5vw,56px) 32px',background:C.bg2 }}>
        <h1 style={{ fontFamily:C.serif,fontSize:'clamp(28px,4vw,48px)',fontWeight:400,fontStyle:'italic',color:C.ink }}>Shop Everything</h1>
        <p style={{ fontFamily:C.sans,fontSize:10,color:C.mid,marginTop:8,letterSpacing:'0.1em' }}>{available.length} products</p>
      </div>

      {/* Filter bar */}
      <div style={{ padding:'20px clamp(20px,5vw,56px)',borderBottom:`1px solid ${C.rule}`,display:'flex',gap:6,overflowX:'auto',background:C.white,flexWrap:'wrap' }}>
        {SHOP_CATS.filter(c=>c==='All'||available.some(p=>p.cat===c)).map(c=>(
          <button key={c} onClick={()=>setFilter(c)} style={{ padding:'7px 18px',border:`1px solid ${filter===c?C.ink:C.rule}`,background:filter===c?C.ink:'transparent',color:filter===c?C.white:C.mid,fontFamily:C.sans,fontSize:9,letterSpacing:'0.14em',textTransform:'uppercase',transition:'all 0.15s',whiteSpace:'nowrap',cursor:'pointer' }}>{c}</button>
        ))}
      </div>

      {/* Grid */}
      <div style={{ padding:'36px clamp(20px,5vw,56px) 80px',background:C.bg }}>
        <div style={{ display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:20 }} className="mobile-grid-2">
          {filtered.map((product,i)=>(
            <div key={product.id} className="product-card" onClick={()=>{ setSelectedProduct(product); setPage('product'); }}
              style={{ background:C.white,cursor:'pointer',position:'relative' }}>
              {product.tag&&(
                <div style={{ position:'absolute',top:10,left:10,zIndex:1,padding:'4px 10px',background:C.ink,fontFamily:C.sans,fontSize:8,letterSpacing:'0.18em',color:'white',textTransform:'uppercase' }}>{product.tag}</div>
              )}
              {/* Wishlist heart */}
              <button onClick={e=>handleWishlistToggle(e,product)} style={{ position:'absolute',top:10,right:10,zIndex:2,background:'rgba(253,248,245,0.85)',border:'none',borderRadius:'50%',width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,color:wishlist.has(product.id)?C.crimson:C.mid,cursor:'pointer',transition:'all 0.15s',backdropFilter:'blur(4px)' }}
                onMouseEnter={e=>e.currentTarget.style.color=C.crimson}
                onMouseLeave={e=>e.currentTarget.style.color=wishlist.has(product.id)?C.crimson:C.mid}
              >{wishlist.has(product.id)?'♥':'♡'}</button>
              <div className="card-img" style={{ height:220,overflow:'hidden',background:C.bg2 }}>
                <img src={product.img} alt={product.name} loading="lazy" style={{ width:'100%',height:'100%',objectFit:'cover',objectPosition:'center top',display:'block' }} />
              </div>
              <div className="card-overlay" style={{ position:'absolute',bottom:84,left:0,right:0,display:'flex',justifyContent:'center',opacity:0,padding:'0 16px' }}>
                <button className="btn-primary" onClick={e=>handleQuickAdd(e,product)} style={{ width:'100%',padding:'10px',background:addedId===product.id?'#4caf50':C.crimson,color:'white',border:'none',fontFamily:C.sans,fontSize:9,letterSpacing:'0.16em',textTransform:'uppercase',transition:'background 0.2s ease',cursor:'pointer' }}>
                  {addedId===product.id?'✓ Added':'Quick Add'}
                </button>
              </div>
              <div style={{ padding:'14px 16px 18px' }}>
                <p style={{ fontFamily:C.body,fontSize:16,color:C.ink }}>{product.name}</p>
                <Stars id={`shop-${product.id}`} initial={[5,4,5,5,4,5,5,4][i]||4} size={12} />
                <p style={{ fontFamily:C.sans,fontSize:12,color:C.mid,marginTop:6 }}>₦{product.price}</p>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

/* ── Recently Purchased ── */
function RecentlyPurchased({ setPage, setSelectedProduct, products }) {
  const recent = getRecentPurchases();
  if (recent.length === 0) return null;
  const items = recent.flatMap(r=>r.items).filter((v,i,a)=>a.findIndex(x=>x.id===v.id)===i).slice(0,4);
  if (items.length === 0) return null;
  const allProds = products;
  return (
    <section style={{ padding:'56px clamp(20px,5vw,56px)',background:C.bg2 }}>
      <div style={{ display:'flex',alignItems:'baseline',gap:16,marginBottom:32 }}>

        <div style={{ flex:1,height:1,background:C.rule }} />
      </div>
      <div style={{ display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:16 }} className="mobile-grid-2">
        {items.map(item=>{
          const full = allProds.find(p=>p.id===item.id) || item;
          return (
            <div key={item.id} className="product-card" onClick={()=>{ setSelectedProduct(full); setPage('product'); }} style={{ background:C.white,cursor:'pointer' }}>
              <div className="card-img" style={{ height:180,overflow:'hidden',background:C.bg }}>
                <img src={item.img} alt={item.name} loading="lazy" style={{ width:'100%',height:'100%',objectFit:'cover',objectPosition:'center top',display:'block' }} />
              </div>
              <div style={{ padding:'12px 14px 16px' }}>
                <p style={{ fontFamily:C.body,fontSize:14,color:C.ink }}>{item.name}</p>
                {item.variant&&<p style={{ fontFamily:C.sans,fontSize:10,color:C.mid,marginTop:2 }}>{item.variant}</p>}

/* ── Checkout ── */
function Checkout({ cart, onBack, onComplete }) {
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({ first:'',last:'',email:'',phone:'',address:'',city:'',state:'',zip:'',country:'Nigeria',shipping:'',cardNum:'',expiry:'',cvv:'',name:'' });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const inputStyle = { width:'100%',padding:'11px 14px',border:`1px solid ${C.rule}`,background:C.white,fontFamily:C.sans,fontSize:13,color:C.ink,outline:'none',transition:'border-color 0.15s' };
  const steps = ['Contact','Shipping','Payment','Confirm'];

  const focusStyle = e => e.target.style.borderColor = C.ink;
  const blurStyle  = e => e.target.style.borderColor = C.rule;

  function sendReceipt(formData, cartData, orderRef) {
    if (typeof emailjs === 'undefined') return;
    if (window.EMAILJS_PUBLIC_KEY === 'REPLACE_WITH_EMAILJS_PUBLIC_KEY') return;

    // Build HTML rows so the email template can render a proper item table
    const order_items = cartData.items.map(item => {
      const lineTotal  = (item.price * item.qty).toLocaleString('en-NG', {minimumFractionDigits:2});
      const variantQty = [item.variant, `Qty ${item.qty}`].filter(Boolean).join(' &middot; ');
      return `<tr>
        <td style="padding:14px 0;border-bottom:1px solid #f0e4dc;font-family:'Ovo',Georgia,serif;font-size:15px;color:#2a0808;line-height:1.5;">
          ${item.name}<br>
          <span style="font-family:'Jost',Arial,sans-serif;font-size:11px;color:#a07060;letter-spacing:0.04em;">${variantQty}</span>
        </td>
        <td style="padding:14px 0;border-bottom:1px solid #f0e4dc;font-family:'Playfair Display',Georgia,serif;font-size:16px;color:#2a0808;text-align:right;white-space:nowrap;vertical-align:top;">&#8358;${lineTotal}</td>
      </tr>`;
    }).join('');

    const fmt     = n => n.toLocaleString('en-NG', {minimumFractionDigits:2});
    const address = [formData.address, formData.city, [formData.state, formData.zip].filter(Boolean).join(' '), 'Nigeria']
                      .filter(Boolean).join('<br>');

    emailjs.send(
      window.EMAILJS_SERVICE_ID,
      window.EMAILJS_TEMPLATE_ID,
      {
        to_name:     `${formData.first} ${formData.last}`.trim() || 'Valued Customer',
        to_email:    formData.email,
        order_ref:   orderRef,
        order_items,
        subtotal:    `&#8358;${fmt(cartData.total)}`,
        tax:         `&#8358;${fmt(cartData.total * 0.08)}`,
        shipping:    formData.shipping || 'Fez Delivery &mdash; Free',
        total:       `&#8358;${fmt(cartData.total * 1.08)}`,
        address,
      }
    ).catch(() => {});
  }

  return (
    <div style={{ paddingTop:64,minHeight:'100vh',background:C.bg }}>
      {/* Progress */}
      <div style={{ padding:'24px clamp(20px,5vw,56px)',background:C.white,borderBottom:`1px solid ${C.rule}` }}>
        <button onClick={onBack} style={{ background:'none',border:'none',fontFamily:C.sans,fontSize:10,color:C.mid,letterSpacing:'0.12em',cursor:'pointer',marginBottom:16 }}>← Back to cart</button>
        <div style={{ display:'flex',gap:0,alignItems:'center' }}>
          {steps.map((s,i)=>(
            <React.Fragment key={i}>
              <div style={{ display:'flex',alignItems:'center',gap:8 }}>
                <div style={{ width:28,height:28,borderRadius:'50%',background:step>i+1?C.crimson:step===i+1?C.ink:'transparent',border:`1px solid ${step>=i+1?C.ink:C.rule}`,display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.2s',flexShrink:0 }}>
                  {step>i+1?<span style={{ color:'white',fontSize:12 }}>✓</span>:<span style={{ fontFamily:C.sans,fontSize:10,color:step===i+1?'white':C.mid }}>{i+1}</span>}
                </div>
                <span style={{ fontFamily:C.sans,fontSize:10,letterSpacing:'0.12em',textTransform:'uppercase',color:step>=i+1?C.ink:C.mid }} className="hide-mobile">{s}</span>
              </div>
              {i<steps.length-1&&<div style={{ flex:1,height:1,background:C.rule,margin:'0 8px' }} />}
            </React.Fragment>
          ))}
        </div>
      </div>

      <div style={{ display:'grid',gridTemplateColumns:'1fr 360px',gap:0,maxWidth:1100,margin:'0 auto' }} className="mobile-grid-1">
        {/* Form */}
        <div style={{ padding:'clamp(24px,4vw,48px)' }}>
          {step===1&&(
            <div style={{ display:'flex',flexDirection:'column',gap:20 }}>
              <h2 style={{ fontFamily:C.serif,fontSize:28,fontStyle:'italic',color:C.ink }}>Contact</h2>
              <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:14 }} className="mobile-grid-1">
                <div><label style={{ fontFamily:C.sans,fontSize:9,letterSpacing:'0.16em',color:C.mid,textTransform:'uppercase',display:'block',marginBottom:6 }}>First Name</label><input style={inputStyle} value={form.first} onChange={e=>set('first',e.target.value)} placeholder="Ada" onFocus={focusStyle} onBlur={blurStyle} /></div>
                <div><label style={{ fontFamily:C.sans,fontSize:9,letterSpacing:'0.16em',color:C.mid,textTransform:'uppercase',display:'block',marginBottom:6 }}>Last Name</label><input style={inputStyle} value={form.last} onChange={e=>set('last',e.target.value)} placeholder="Okafor" onFocus={focusStyle} onBlur={blurStyle} /></div>
              </div>
              <div><label style={{ fontFamily:C.sans,fontSize:9,letterSpacing:'0.16em',color:C.mid,textTransform:'uppercase',display:'block',marginBottom:6 }}>Email</label><input style={inputStyle} type="email" value={form.email} onChange={e=>set('email',e.target.value)} placeholder="ada@email.com" onFocus={focusStyle} onBlur={blurStyle} /></div>
              <div><label style={{ fontFamily:C.sans,fontSize:9,letterSpacing:'0.16em',color:C.mid,textTransform:'uppercase',display:'block',marginBottom:6 }}>Phone</label><input style={inputStyle} value={form.phone} onChange={e=>set('phone',e.target.value)} placeholder="+234 800 000 0000" onFocus={focusStyle} onBlur={blurStyle} /></div>
              <button className="btn-primary" onClick={()=>setStep(2)} style={{ padding:'14px',background:C.crimson,color:C.white,border:'none',fontFamily:C.sans,fontSize:10,letterSpacing:'0.2em',textTransform:'uppercase',marginTop:8,cursor:'pointer' }}>Continue to Shipping →</button>

          {step===2&&(

              <h2 style={{ fontFamily:C.serif,fontSize:28,fontStyle:'italic',color:C.ink }}>Shipping</h2>

              <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:14 }} className="mobile-grid-1">
                <div><label style={{ fontFamily:C.sans,fontSize:9,letterSpacing:'0.16em',color:C.mid,textTransform:'uppercase',display:'block',marginBottom:6 }}>City</label><input style={inputStyle} value={form.city} onChange={e=>set('city',e.target.value)} placeholder="Lagos" onFocus={focusStyle} onBlur={blurStyle} /></div>

              <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:14 }} className="mobile-grid-1">

              <div style={{ padding:'12px 16px',background:'#f0faf0',border:'1px solid #c8e6c9',display:'flex',gap:10,alignItems:'center' }}>
                <span style={{ color:'#4caf50',fontSize:14 }}>🔒</span>
                <p style={{ fontFamily:C.sans,fontSize:11,color:'#2e7d32' }}>Secured by Paystack — card, bank transfer & USSD</p>
              </div>
              <div style={{ padding:'32px',background:C.bg2,display:'flex',flexDirection:'column',alignItems:'center',gap:16,textAlign:'center' }}>
                <img src="https://website-v3-assets.s3.amazonaws.com/assets/img/hero/Paystack-HeroImage-resize.png" alt="Paystack" style={{ height:32,objectFit:'contain' }} onError={e=>e.target.style.display='none'} />
                <p style={{ fontFamily:C.body,fontSize:14,color:C.mid,lineHeight:1.8 }}>
                  Pay securely with your debit card, credit card, bank transfer, or USSD.
                </p>
                <p style={{ fontFamily:C.sans,fontSize:11,color:C.mid }}>
                  Amount: <strong style={{ color:C.ink,fontFamily:C.serif,fontSize:16 }}>₦{(cart.total*1.08).toFixed(2)}</strong>
                </p>
              </div>
              <div style={{ display:'flex',gap:12,marginTop:8 }}>
                <button onClick={()=>setStep(2)} style={{ padding:'14px 24px',background:'transparent',color:C.mid,border:`1px solid ${C.rule}`,fontFamily:C.sans,fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',cursor:'pointer' }}>← Back</button>
                <button className="btn-primary" onClick={()=>{
                  if(typeof PaystackPop==='undefined'){ alert('Paystack is loading, please try again.'); return; }
                  const ref = 'SMTR-' + Date.now();
                  const handler = PaystackPop.setup({
                    key: 'pk_live_REPLACE_WITH_YOUR_PAYSTACK_PUBLIC_KEY',
                    email: form.email || 'customer@shopmorethanrubies.com',
                    amount: Math.round(cart.total * 1.08 * 100),
                    currency: 'NGN',
                    ref,
                    metadata: { name: `${form.first} ${form.last}`, phone: form.phone },
                    onClose: ()=>{},
                    callback: (response)=>{
                      sendReceipt(form, cart, response.reference || ref);
                      setStep(4);
                    },
                  });
                  handler.openIframe();
                }} style={{ flex:1,padding:'14px',background:'#00c3f7',color:'white',border:'none',fontFamily:C.sans,fontSize:10,letterSpacing:'0.2em',textTransform:'uppercase',cursor:'pointer',transition:'background 0.15s' }}
                  onMouseEnter={e=>e.currentTarget.style.background='#00a8d4'}
                  onMouseLeave={e=>e.currentTarget.style.background='#00c3f7'}
                >Pay with Paystack →</button>
              </div>
            </div>
          )}

          {step===4&&(
            <div style={{ display:'flex',flexDirection:'column',gap:24,alignItems:'center',textAlign:'center',padding:'48px 0' }}>
              <div style={{ width:64,height:64,borderRadius:'50%',background:'#f0faf0',border:'2px solid #4caf50',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28 }}>✓</div>
              <h2 style={{ fontFamily:C.serif,fontSize:32,fontStyle:'italic',color:C.ink }}>Order Confirmed!</h2>
              <p style={{ fontFamily:C.body,fontSize:14,color:C.mid,lineHeight:2,maxWidth:380 }}>
                Thank you for your order, {form.first||'lovely'}. We'll send a confirmation to {form.email||'your email'} once your order is on its way.
              </p>
              <p style={{ fontFamily:C.sans,fontSize:10,color:C.mid,letterSpacing:'0.1em' }}>Delivered by Fez · 3–5 business days</p>
              <button className="btn-primary" onClick={onComplete} style={{ padding:'13px 40px',background:C.crimson,color:C.white,border:'none',fontFamily:C.sans,fontSize:10,letterSpacing:'0.2em',textTransform:'uppercase',marginTop:8,cursor:'pointer' }}>Continue Shopping →</button>
            </div>
          )}
        </div>

        {/* Order summary sidebar */}
        <div style={{ background:C.bg2,padding:'clamp(24px,4vw,48px)',borderLeft:`1px solid ${C.rule}` }}>
          <h3 style={{ fontFamily:C.serif,fontSize:20,fontWeight:400,color:C.ink,marginBottom:24 }}>Order Summary</h3>
          <div style={{ display:'flex',flexDirection:'column',gap:0 }}>
            {cart.items.map((item,i)=>(
              <div key={i} style={{ display:'grid',gridTemplateColumns:'56px 1fr auto',gap:12,alignItems:'center',padding:'14px 0',borderBottom:`1px solid ${C.rule}` }}>
                <div style={{ width:56,height:56,overflow:'hidden',background:C.panel,position:'relative' }}>
                  <img src={item.img} alt="" style={{ width:'100%',height:'100%',objectFit:'cover' }} />
                  <div style={{ position:'absolute',top:-4,right:-4,background:C.ink,color:'white',fontSize:9,width:16,height:16,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center' }}>{item.qty}</div>
                </div>
                <div>
                  <p style={{ fontFamily:C.body,fontSize:13,color:C.ink }}>{item.name}</p>
                  <p style={{ fontFamily:C.sans,fontSize:10,color:C.mid,marginTop:2 }}>{item.variant}</p>
                </div>
                <p style={{ fontFamily:C.serif,fontSize:14,color:C.ink }}>₦{(item.price*item.qty).toFixed(0)}</p>
              </div>
            ))}
          </div>
          <div style={{ marginTop:20,display:'flex',flexDirection:'column',gap:10 }}>
            {[['Subtotal',`₦${cart.total.toFixed(2)}`],['Shipping','Free'],['Tax',`₦${(cart.total*0.08).toFixed(2)}`]].map(([k,v])=>(
              <div key={k} style={{ display:'flex',justifyContent:'space-between' }}>
                <span style={{ fontFamily:C.sans,fontSize:11,color:C.mid }}>{k}</span>
                <span style={{ fontFamily:C.serif,fontSize:13,color:C.ink }}>{v}</span>
              </div>
            ))}
            <div style={{ height:1,background:C.rule,margin:'4px 0' }} />
            <div style={{ display:'flex',justifyContent:'space-between' }}>
              <span style={{ fontFamily:C.sans,fontSize:12,fontWeight:500,color:C.ink }}>Total</span>
              <span style={{ fontFamily:C.serif,fontSize:18,color:C.ink }}>₦{(cart.total*1.08).toFixed(2)}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Footer ── */
function Footer({ setPage }) {
  return (
    <footer style={{ background:C.ink,padding:'56px clamp(20px,5vw,56px) 40px' }}>
      <div style={{ display:'grid',gridTemplateColumns:'1.5fr 1fr 1fr 1fr',gap:32 }} className="mobile-grid-2">
        <div style={{ display:'flex',flexDirection:'column',gap:16 }}>
          <p style={{ fontFamily:C.serif,fontSize:20,color:C.white,fontStyle:'italic' }}>Shopmorethanrubies</p>
          <p style={{ fontFamily:C.body,fontSize:12,color:'rgba(255,255,255,0.4)',lineHeight:1.9,maxWidth:220 }}>Intentionally chosen objects for homes that feel like you.</p>
          <div style={{ display:'flex' }}>
            <input placeholder="Your email" style={{ flex:1,padding:'9px 12px',background:'rgba(255,255,255,0.07)',border:`1px solid rgba(255,255,255,0.12)`,color:C.white,fontFamily:C.sans,fontSize:10,outline:'none',minWidth:0 }} />
            <button style={{ padding:'9px 16px',background:C.crimson,border:'none',color:C.white,fontSize:12,cursor:'pointer',transition:'background 0.15s' }} onMouseEnter={e=>e.currentTarget.style.background=C.red} onMouseLeave={e=>e.currentTarget.style.background=C.crimson}>→</button>
          </div>
        </div>
        {[
          ['Shop',    ['All Products','Ceramics','Glassware','Lighting','Vases','Mirrors','Travel','Accessories']],
          ['Company', ['Our Story','Shipping & Returns','FAQ','Contact Us']],
          ['Follow',  [
            { label:'Instagram', href:'https://instagram.com/shop.morethanrubies' },
            { label:'TikTok',    href:'https://tiktok.com/@shop.morethanrubies' },
            { label:'Pinterest', href:'https://pin.it/6ZzHdWV9X' },
            { label:'WhatsApp',  href:'#' },
          ]],
        ].map(([hd,links])=>(
          <div key={hd}>
            <p style={{ fontFamily:C.sans,fontSize:9,color:'rgba(255,255,255,0.35)',letterSpacing:'0.22em',textTransform:'uppercase',marginBottom:14 }}>{hd}</p>
            <div style={{ display:'flex',flexDirection:'column',gap:9 }}>
              {links.map(l=>{
                const isObj = typeof l === 'object';
                const label = isObj ? l.label : l;
                const href  = isObj ? l.href : '#';
                const isExt = href.startsWith('http');
                return (
                  <a key={label} href={href}
                    onClick={e=>{ if(!isExt){ e.preventDefault(); if(hd==='Shop') setPage('shop'); } }}
                    target={isExt ? '_blank' : undefined}
                    rel={isExt ? 'noopener noreferrer' : undefined}
                    style={{ fontFamily:C.sans,fontSize:11,color:'rgba(255,255,255,0.48)',textDecoration:'none' }}
                  >{label}</a>
                );
              })}
            </div>
          </div>
        ))}
      </div>
      <div style={{ marginTop:48,paddingTop:24,borderTop:'1px solid rgba(255,255,255,0.08)',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12 }}>
        <p style={{ fontFamily:C.sans,fontSize:10,color:'rgba(255,255,255,0.25)',letterSpacing:'0.08em' }}>© 2026 Shopmorethanrubies. All rights reserved.</p>
        <a href="admin.html" style={{ fontFamily:C.sans,fontSize:10,color:'rgba(255,255,255,0.2)',letterSpacing:'0.12em',textTransform:'uppercase',textDecoration:'none',transition:'color 0.15s' }} onMouseEnter={e=>e.currentTarget.style.color='rgba(255,255,255,0.5)'} onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.2)'}>Admin</a>
      </div>
    </footer>
  );
}

/* ── App root ── */
function App() {
  const [page, setPage]           = useState('home');
  const [cartOpen, setCartOpen]   = useState(false);
  const [wishlistOpen, setWishlistOpen] = useState(false);
  const [checkout, setCheckout]   = useState(false);
  const [authOpen, setAuthOpen]   = useState(false);
  const [user, setUser]           = useState(getUserSession);
  const [products, setProducts]   = useState(loadProducts);
  const [selectedProduct, setSelectedProduct] = useState(()=>loadProducts()[0]);

  const cart     = useCart(user?.id);
  const wishlist = useWishlist(user?.id);

  /* Live product sync — Firestore when available, else localStorage on focus/storage */
  useEffect(()=>{
    if (window.db) {
      const unsub = window.db.collection('smtr_products').onSnapshot(snap => {
        if (!snap.empty) {
          const prods = snap.docs.map(d=>d.data()).sort((a,b)=>Number(a.id)-Number(b.id));
          setProducts(prods);
          try { localStorage.setItem('smtr_products', JSON.stringify(prods)); } catch {}
        }
      }, ()=>{});
      return ()=>unsub();
    }
    const sync = () => setProducts(loadProducts());
    window.addEventListener('focus', sync);
    window.addEventListener('storage', sync);
    return ()=>{ window.removeEventListener('focus',sync); window.removeEventListener('storage',sync); };
  },[]);

  useEffect(()=>{ window.scrollTo(0,0); },[page]);

  const handleUserLogin = sess => setUser(sess);

  const handleUserLogout = () => {
    clearUserSession();
    setUser(null);
  };

  const handleCheckout = () => { setCartOpen(false); setCheckout(true); };
  const handleCheckoutComplete = () => {
    saveRecentPurchase(cart.items);
    cart.clear();
    setCheckout(false);
    setPage('home');
  };

  const navigateTo = (p) => { setPage(p); setCartOpen(false); setWishlistOpen(false); };

  const navProps = {
    cartCount: cart.count, wishlistCount: wishlist.count,
    onCartOpen: ()=>setCartOpen(true), onWishlistOpen: ()=>setWishlistOpen(true),
    setPage: navigateTo, user, onAuthOpen: ()=>setAuthOpen(true), onLogout: handleUserLogout,
  };

  if (checkout) return (
    <>
      <Nav {...navProps} />
      <Checkout cart={cart} onBack={()=>setCheckout(false)} onComplete={handleCheckoutComplete} />
      <AuthModal open={authOpen} onClose={()=>setAuthOpen(false)} onLogin={handleUserLogin} />
    </>
  );

  return (
    <>
      <PromoBanner />
      <Nav {...navProps} />
      <CartDrawer open={cartOpen} onClose={()=>setCartOpen(false)} cart={cart} onCheckout={handleCheckout} />
      <WishlistDrawer open={wishlistOpen} onClose={()=>setWishlistOpen(false)} wishlist={wishlist} cart={cart} setPage={navigateTo} setSelectedProduct={setSelectedProduct} />
      <AuthModal open={authOpen} onClose={()=>setAuthOpen(false)} onLogin={handleUserLogin} />

      <main>
        {page==='home'&&<>
          <Hero setPage={navigateTo} />
          <FeaturedSection products={products} setPage={navigateTo} setSelectedProduct={setSelectedProduct} />
          <RecentlyPurchased products={products} setPage={navigateTo} setSelectedProduct={setSelectedProduct} />
          <Shop setPage={navigateTo} setSelectedProduct={setSelectedProduct} cart={cart} wishlist={wishlist} products={products} />
          <About />
          <Footer setPage={navigateTo} />
        </>}
        {page==='shop'&&<>
          <Shop setPage={navigateTo} setSelectedProduct={setSelectedProduct} cart={cart} wishlist={wishlist} products={products} />
          <Footer setPage={navigateTo} />
        </>}
        {page==='product'&&<>
          <ProductPage product={selectedProduct} cart={cart} wishlist={wishlist} setPage={navigateTo} setSelectedProduct={setSelectedProduct} products={products} />
          <Footer setPage={navigateTo} />
        </>}
        {page==='about'&&<>
          <About />
          <Footer setPage={navigateTo} />
        </>}
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
