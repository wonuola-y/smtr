function Placeholder({ w = '100%', h = 240, label = 'product shot', img = null, style = {} }) {
  if (img) {
    return (
      <div style={{ width: w, height: h, overflow: 'hidden', flexShrink: 0, background: '#ede1d8', ...style }}>
        <img src={img} alt={label} style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: 'center top' }} />
      </div>
    );
  }
  return (
    <div style={{
      width: w, height: h, background: '#ede1d8', position: 'relative',
      overflow: 'hidden', flexShrink: 0, ...style,
    }}>
      <svg width="100%" height="100%" style={{ position: 'absolute', inset: 0 }}>
        <defs>
          <pattern id={`stripe-${label.replace(/\s/g,'-')}`} patternUnits="userSpaceOnUse" width="16" height="16" patternTransform="rotate(45)">
            <line x1="0" y1="0" x2="0" y2="16" stroke="#d4bfb4" strokeWidth="1"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill={`url(#stripe-${label.replace(/\s/g,'-')})`}/>
      </svg>
      <div style={{
        position: 'absolute', inset: 0, display: 'flex',
        alignItems: 'center', justifyContent: 'center',
        fontFamily: "'Jost', sans-serif", fontSize: 10, color: '#b89080',
        letterSpacing: '0.12em', textTransform: 'uppercase',
        textAlign: 'center', padding: '8px',
      }}>{label}</div>
    </div>
  );
}

/* ── Star Rating component ──────────────────────────── */
const RATINGS_KEY = 'smtr_ratings';
function getRatings() {
  try { return JSON.parse(localStorage.getItem(RATINGS_KEY)) || {}; } catch { return {}; }
}
function saveRating(id, val) {
  const r = getRatings(); r[id] = val;
  try { localStorage.setItem(RATINGS_KEY, JSON.stringify(r)); } catch {}
}

function StarRating({ productId, initialRating = 0, color = '#a81111', size = 13 }) {
  const stored = getRatings()[productId];
  const [rating, setRating] = React.useState(stored || initialRating);
  const [hover, setHover] = React.useState(0);
  const handleClick = (val) => { setRating(val); saveRating(productId, val); };
  return (
    <div style={{ display: 'flex', gap: 2, alignItems: 'center' }}>
      {[1,2,3,4,5].map(i => (
        <span key={i}
          onClick={() => handleClick(i)}
          onMouseEnter={() => setHover(i)}
          onMouseLeave={() => setHover(0)}
          style={{ color: i <= (hover || rating) ? color : '#d8c4b8', fontSize: size, cursor: 'pointer', lineHeight: 1, userSelect: 'none' }}
        >★</span>
      ))}
      {rating > 0 && <span style={{ fontFamily: "'Jost', sans-serif", fontSize: 9, color: '#b89080', marginLeft: 4, letterSpacing: '0.06em' }}>{rating}.0</span>}
    </div>
  );
}

        <Placeholder h={104} label="product close-up" />

        {[['Subtotal (3 items)','$168'],['Shipping','Free'],['Estimated tax','$13.44'],['Order total','$181.44']].map(([k,v]) => (

  return (
    <div style={{ background: W.bg }}>

/* --- TWEAKS --- */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"showDirection1":true,"showDirection2":true,"showDirection3":true,"focusSection":"all"}/*EDITMODE-END*/;

/* --- MAIN CANVAS --- */
function App() {
  const result = useTweaks(TWEAK_DEFAULTS);
  const tweaks = result?.tweaks ?? TWEAK_DEFAULTS;
  const setTweak = result?.setTweak ?? (() => {});

  const sections = [
    { id: 'hero',    label: 'Hero' },
    { id: 'shop',    label: 'Shop Grid' },
    { id: 'product', label: 'Product Page' },
    { id: 'about',   label: 'About' },
    { id: 'cart',    label: 'Cart' },
    { id: 'footer',  label: 'Footer' },
    { id: 'all',     label: 'All Sections' },
  ];

  return (
    <>
      <TweaksPanel>
        <TweakSection label="Directions">
          <TweakToggle label="Quiet (Dir. 1)" value={tweaks.showDirection1} onChange={v => setTweak('showDirection1', v)} />
          <TweakToggle label="Structure (Dir. 2)" value={tweaks.showDirection2} onChange={v => setTweak('showDirection2', v)} />
          <TweakToggle label="Warmth (Dir. 3)" value={tweaks.showDirection3} onChange={v => setTweak('showDirection3', v)} />
        </TweakSection>
        <TweakSection label="Focus Section">
          <TweakSelect
            label="Show"
            value={tweaks.focusSection}
            options={sections.map(s => ({ value: s.id, label: s.label }))}
            onChange={v => setTweak('focusSection', v)}
          />
        </TweakSection>
      </TweaksPanel>

      <DesignCanvas>
        {tweaks.showDirection1 && (
          <DCSection id="dir1" title="Direction 1 — Quiet">
            <DCPostIt>Extreme negative space · centered editorial · whisper-weight serif type</DCPostIt>
            {(tweaks.focusSection === 'all' || tweaks.focusSection === 'hero') && <DCArtboard id="q-hero" label="Hero" width={900}><div style={{overflow:'hidden'}}><Q_Nav /><Q_Hero /></div></DCArtboard>}
            {(tweaks.focusSection === 'all' || tweaks.focusSection === 'shop') && <DCArtboard id="q-shop" label="Shop Grid" width={900}><Q_ShopGrid /></DCArtboard>}
            {(tweaks.focusSection === 'all' || tweaks.focusSection === 'product') && <DCArtboard id="q-product" label="Product Page" width={900}><Q_ProductPage /></DCArtboard>}
            {(tweaks.focusSection === 'all' || tweaks.focusSection === 'about') && <DCArtboard id="q-about" label="About" width={900}><Q_About /></DCArtboard>}
            {(tweaks.focusSection === 'all' || tweaks.focusSection === 'cart') && <DCArtboard id="q-cart" label="Cart" width={900}><Q_Cart /></DCArtboard>}
            {(tweaks.focusSection === 'all' || tweaks.focusSection === 'footer') && <DCArtboard id="q-footer" label="Footer" width={900}><Q_Footer /></DCArtboard>}
          </DCSection>
        )}

        {tweaks.showDirection2 && (
          <DCSection id="dir2" title="Direction 2 — Structure">
            <DCPostIt>Two-column asymmetric grid · vertical rules · stark sans + italic serif</DCPostIt>
            {(tweaks.focusSection === 'all' || tweaks.focusSection === 'hero') && <DCArtboard id="s-hero" label="Hero" width={960}><div style={{overflow:'hidden'}}><S_Nav /><S_Hero /></div></DCArtboard>}
            {(tweaks.focusSection === 'all' || tweaks.focusSection === 'shop') && <DCArtboard id="s-shop" label="Shop Grid" width={960}><S_ShopGrid /></DCArtboard>}
            {(tweaks.focusSection === 'all' || tweaks.focusSection === 'product') && <DCArtboard id="s-product" label="Product Page" width={960}><S_ProductPage /></DCArtboard>}
            {(tweaks.focusSection === 'all' || tweaks.focusSection === 'about') && <DCArtboard id="s-about" label="About" width={960}><S_About /></DCArtboard>}
            {(tweaks.focusSection === 'all') && <DCArtboard id="s-reviews" label="Reviews" width={960}><S_Reviews /></DCArtboard>}
            {(tweaks.focusSection === 'all' || tweaks.focusSection === 'cart') && <DCArtboard id="s-cart" label="Cart" width={960}><S_Cart /></DCArtboard>}
            {(tweaks.focusSection === 'all' || tweaks.focusSection === 'footer') && <DCArtboard id="s-footer" label="Footer" width={960}><S_Footer /></DCArtboard>}
          </DCSection>
        )}

        {tweaks.showDirection3 && (
          <DCSection id="dir3" title="Direction 3 — Warmth">
            <DCPostIt>Warmer grey-beige tones · 4-col product grid · rich editorial about section</DCPostIt>
            {(tweaks.focusSection === 'all' || tweaks.focusSection === 'hero') && <DCArtboard id="w-hero" label="Hero" width={960}><div style={{overflow:'hidden'}}><W_Nav /><W_Hero /></div></DCArtboard>}
            {(tweaks.focusSection === 'all' || tweaks.focusSection === 'shop') && <DCArtboard id="w-shop" label="Shop Grid" width={960}><W_ShopGrid /></DCArtboard>}
            {(tweaks.focusSection === 'all' || tweaks.focusSection === 'product') && <DCArtboard id="w-product" label="Product Page" width={960}><W_ProductPage /></DCArtboard>}
            {(tweaks.focusSection === 'all' || tweaks.focusSection === 'about') && <DCArtboard id="w-about" label="About" width={960}><W_About /></DCArtboard>}
            {(tweaks.focusSection === 'all' || tweaks.focusSection === 'cart') && <DCArtboard id="w-cart" label="Cart" width={960}><W_Cart /></DCArtboard>}
            {(tweaks.focusSection === 'all' || tweaks.focusSection === 'footer') && <DCArtboard id="w-footer" label="Footer" width={960}><W_Footer /></DCArtboard>}
          </DCSection>
        )}
      </DesignCanvas>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<div id="root"></div>
</body>
</html>
