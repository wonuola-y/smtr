<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Jost', sans-serif; background: #fdf8f5; color: #2a0808; overflow-x: hidden; }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; font-family: 'Jost', sans-serif; }
input, textarea, select { font-family: 'Jost', sans-serif; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.fade-up { animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both; }
.fade-in { animation: fadeIn 0.5s ease both; }

.product-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
.product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(42,8,8,0.1); }
.product-card:hover .card-overlay { opacity: 1 !important; }
.product-card:hover .card-img img { transform: scale(1.04); }
.card-img img { transition: transform 0.4s ease; }
.card-overlay { transition: opacity 0.2s ease; }

.nav-link { position: relative; }
.nav-link::after { content:''; position:absolute; bottom:-2px; left:0; right:0; height:1px; background:#e9201f; transform:scaleX(0); transform-origin:left; transition:transform 0.2s ease; }
.nav-link:hover::after { transform:scaleX(1); }

.btn-primary { transition: background 0.18s ease, color 0.18s ease; }
.btn-primary:hover { background: #a81111 !important; }
.btn-outline { transition: background 0.18s ease, color 0.18s ease; }
.btn-outline:hover { background: #2a0808 !important; color: #fdf8f5 !important; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #ede1d8; }
::-webkit-scrollbar-thumb { background: #c04040; border-radius: 3px; }

@media (max-width: 768px) {
  .hide-mobile { display: none !important; }
  .show-mobile { display: flex !important; }
  .mobile-full { width: 100% !important; flex: unset !important; }
  .mobile-col  { flex-direction: column !important; }
  .mobile-grid-2 { grid-template-columns: repeat(2, 1fr) !important; }
  .mobile-grid-1 { grid-template-columns: 1fr !important; }
  .mobile-p { padding: 24px 20px !important; }
  .mobile-text-center { text-align: center !important; }
}

/* ── Persistent ratings ── */
const RATINGS_KEY = 'smtr_ratings';
function getRatings() { try { return JSON.parse(localStorage.getItem(RATINGS_KEY))||{}; } catch { return {}; } }
function saveRating(id,v) { const r=getRatings(); r[id]=v; try { localStorage.setItem(RATINGS_KEY,JSON.stringify(r)); } catch {} }

/* ── Stars ── */
function Stars({ id, initial=4, size=13, color=C.crimson }) {
  const [rating, setRating] = useState(getRatings()[id] || initial);
  const [hover, setHover] = useState(0);
  return (
    <div style={{ display:'flex', gap:2, alignItems:'center' }}>
      {[1,2,3,4,5].map(i=>(
        <span key={i}
          onClick={()=>{ setRating(i); saveRating(id,i); }}
          onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(0)}
          style={{ color:i<=(hover||rating)?color:'#d8c4b8', fontSize:size, cursor:'pointer', userSelect:'none', lineHeight:1 }}>★</span>
      ))}
      <span style={{ fontFamily:C.sans, fontSize:9, color:C.mid, marginLeft:4 }}>{(hover||rating).toFixed(1)}</span>
    </div>
  );
}

/* ── Wishlist hook ── */
function useWishlist() {
  const [items, setItems] = useState(()=>{ try { return JSON.parse(localStorage.getItem('smtr_wishlist'))||[]; } catch { return []; } });
  const persist = it => { setItems(it); try { localStorage.setItem('smtr_wishlist',JSON.stringify(it)); } catch {} };
  const toggle = product => {
    const exists = items.find(i=>i.id===product.id);
    if (exists) persist(items.filter(i=>i.id!==product.id));
    else persist([...items, product]);
  };
  const has = id => items.some(i=>i.id===id);
  return { items, toggle, has, count:items.length };
}

/* ── Cart hook ── */
function useCart() {
  const [items, setItems] = useState(()=>{ try { return JSON.parse(localStorage.getItem('smtr_cart'))||[]; } catch { return []; } });
  const persist = it => { setItems(it); try { localStorage.setItem('smtr_cart',JSON.stringify(it)); } catch {} };
  const add = (product, variant) => {
    const ex = items.find(i=>i.id===product.id&&i.variant===variant);
    if (ex) persist(items.map(i=>i.id===product.id&&i.variant===variant?{...i,qty:i.qty+1}:i));
    else persist([...items, {...product, variant, qty:1}]);
  };
  const remove  = (id,variant) => persist(items.filter(i=>!(i.id===id&&i.variant===variant)));
  const updateQty = (id,variant,qty) => { if(qty<1) remove(id,variant); else persist(items.map(i=>i.id===id&&i.variant===variant?{...i,qty}:i)); };
  const total = items.reduce((s,i)=>s+i.price*i.qty,0);
  const count = items.reduce((s,i)=>s+i.qty,0);
  return { items, add, remove, updateQty, total, count };
}

/* ── Shop Page ── */
function Shop({ setPage, setSelectedProduct, cart, wishlist }) {
  const [filter, setFilter] = useState('All');
  const [addedId, setAddedId] = useState(null);
  const cats = ['All', ...new Set(PRODUCTS.map(p=>p.cat))];
  const filtered = filter==='All' ? PRODUCTS : PRODUCTS.filter(p=>p.cat===filter);

  const handleQuickAdd = (e, product) => {
    e.stopPropagation();
    cart.add(product, product.variants[0]);
    setAddedId(product.id);
    setTimeout(()=>setAddedId(null), 1400);

    e.stopPropagation();
    wishlist.toggle(product);
  };

  return (
    <div style={{ paddingTop:64 }}>
      <div style={{ padding:'48px clamp(20px,5vw,56px) 32px',background:C.bg2 }}>
        <h1 style={{ fontFamily:C.serif,fontSize:'clamp(28px,4vw,48px)',fontWeight:400,fontStyle:'italic',color:C.ink }}>Shop Everything</h1>

        {cats.map(c=>(
          <button key={c} onClick={()=>setFilter(c)} style={{ padding:'7px 18px',border:`1px solid ${filter===c?C.ink:C.rule}`,background:filter===c?C.ink:'transparent',color:filter===c?C.white:C.mid,fontFamily:C.sans,fontSize:9,letterSpacing:'0.14em',textTransform:'uppercase',transition:'all 0.15s',whiteSpace:'nowrap',cursor:'pointer' }}>{c}</button>
        ))}
      </div>

      {/* Grid */}
      <div style={{ padding:'36px clamp(20px,5vw,56px) 80px',background:C.bg }}>
        <div style={{ display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:20 }} className="mobile-grid-2">
          {filtered.map((product,i)=>(
            <div key={product.id} className="product-card" onClick={()=>{ setSelectedProduct(product); setPage('product'); }}
              style={{ background:C.white,cursor:'pointer',position:'relative' }}>
              {product.tag&&(
                <div style={{ position:'absolute',top:10,left:10,zIndex:1,padding:'4px 10px',background:C.ink,fontFamily:C.sans,fontSize:8,letterSpacing:'0.18em',color:'white',textTransform:'uppercase' }}>{product.tag}</div>
              )}
              {/* Wishlist heart */}
              <button onClick={e=>handleWishlistToggle(e,product)} style={{ position:'absolute',top:10,right:10,zIndex:2,background:'rgba(253,248,245,0.85)',border:'none',borderRadius:'50%',width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,color:wishlist.has(product.id)?C.crimson:C.mid,cursor:'pointer',transition:'all 0.15s',backdropFilter:'blur(4px)' }}
                onMouseEnter={e=>e.currentTarget.style.color=C.crimson}
                onMouseLeave={e=>e.currentTarget.style.color=wishlist.has(product.id)?C.crimson:C.mid}
              >{wishlist.has(product.id)?'♥':'♡'}</button>
              <div className="card-img" style={{ height:220,overflow:'hidden',background:C.bg2 }}>
                <img src={product.img} alt={product.name} style={{ width:'100%',height:'100%',objectFit:'cover',objectPosition:'center top',display:'block' }} />
              </div>
              <div className="card-overlay" style={{ position:'absolute',bottom:84,left:0,right:0,display:'flex',justifyContent:'center',opacity:0,padding:'0 16px' }}>
                <button className="btn-primary" onClick={e=>handleQuickAdd(e,product)} style={{ width:'100%',padding:'10px',background:addedId===product.id?'#4caf50':C.crimson,color:'white',border:'none',fontFamily:C.sans,fontSize:9,letterSpacing:'0.16em',textTransform:'uppercase',transition:'background 0.2s ease',cursor:'pointer' }}>

              <div style={{ padding:'14px 16px 18px' }}>

              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── App root ── */
function App() {
  const [page, setPage] = useState('home');
  const [cartOpen, setCartOpen] = useState(false);
  const [wishlistOpen, setWishlistOpen] = useState(false);
  const [checkout, setCheckout] = useState(false);
  const [selectedProduct, setSelectedProduct] = useState(PRODUCTS[0]);
  const cart = useCart();
  const wishlist = useWishlist();

  useEffect(()=>{ window.scrollTo(0,0); },[page]);

  const handleCheckout = () => { setCartOpen(false); setCheckout(true); };
  const handleCheckoutComplete = () => { setCheckout(false); setPage('home'); };

  const navigateTo = (p) => { setPage(p); setCartOpen(false); setWishlistOpen(false); };

  if (checkout) return (
    <>
      <Nav cartCount={cart.count} wishlistCount={wishlist.count} onCartOpen={()=>setCartOpen(true)} onWishlistOpen={()=>setWishlistOpen(true)} setPage={navigateTo} />
      <Checkout cart={cart} onBack={()=>setCheckout(false)} onComplete={handleCheckoutComplete} />
    </>
  );

  return (
    <>
      <PromoBanner />
      <Nav cartCount={cart.count} wishlistCount={wishlist.count} onCartOpen={()=>setCartOpen(true)} onWishlistOpen={()=>setWishlistOpen(true)} setPage={navigateTo} />
      <CartDrawer open={cartOpen} onClose={()=>setCartOpen(false)} cart={cart} onCheckout={handleCheckout} />
      <WishlistDrawer open={wishlistOpen} onClose={()=>setWishlistOpen(false)} wishlist={wishlist} cart={cart} setPage={navigateTo} setSelectedProduct={setSelectedProduct} />

      <main>
        {page==='home'&&<>
          <Hero setPage={navigateTo} />
          <Shop setPage={navigateTo} setSelectedProduct={setSelectedProduct} cart={cart} wishlist={wishlist} />
          <About />
          <Footer setPage={navigateTo} />
        </>}
        {page==='shop'&&<>
          <Shop setPage={navigateTo} setSelectedProduct={setSelectedProduct} cart={cart} wishlist={wishlist} />
          <Footer setPage={navigateTo} />
        </>}
        {page==='product'&&<>
          <ProductPage product={selectedProduct} cart={cart} wishlist={wishlist} setPage={navigateTo} setSelectedProduct={setSelectedProduct} />
          <Footer setPage={navigateTo} />
        </>}
        {page==='about'&&<>
          <About />
          <Footer setPage={navigateTo} />
        </>}
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
